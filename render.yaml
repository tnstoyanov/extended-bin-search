services:
  - type: web
    name: binbase-search
    env: node
    plan: free
    
    # Build and start commands
    buildCommand: npm install
    startCommand: npm start
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/bins.db
      - key: PORT
        value: 3000
    
    # Persistent disk for SQLite database
    disk:
      - name: sqlite-data
        mountPath: /var/data
        sizeGB: 1  # 1GB is more than enough for the 397MB SQLite file
